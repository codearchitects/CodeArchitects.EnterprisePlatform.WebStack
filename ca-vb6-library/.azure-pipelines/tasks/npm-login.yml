parameters:
- name: workDir
  type: string
  default: $(System.DefaultWorkingDirectory)
- name: feed
  type: string
- name: organization
  type: string

steps:
- task: PowerShell@2
  displayName: npm login to ${{ parameters.feed }}
  inputs:
    targetType: 'inline'
    workingDirectory: ${{ parameters.workDir }}
    script: |
      npm config set "//${{ parameters.organization }}/_packaging/${{ parameters.feed }}/npm/registry/:_authToken" "$(System.AccessToken)"
      npm config get