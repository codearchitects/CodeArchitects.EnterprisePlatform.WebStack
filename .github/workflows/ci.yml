name: CI

# Validates every pull request and pushes to the default branch by building all
# workspace packages and running their test suites. Browser (karma) tests run
# against ChromeHeadless in no-sandbox mode.

on:
  push:
    branches: [main, master, "version/8"]
  pull_request:
    branches: [main, master, "version/8"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install (single workspace install)
        run: npm ci

      - name: Build all packages (topological order)
        run: npm run build

      - name: Test all packages
        run: npm run test
        env:
          CI: "true"

  security:
    name: Security & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm

      - name: Install (single workspace install)
        run: npm ci

      - name: Vulnerability scan (full, informational)
        shell: bash
        run: |
          echo "::group::All vulnerabilities (production + dev/build tooling)"
          npm audit || true
          echo "::endgroup::"
        continue-on-error: true

      - name: Warn on unaccepted vulnerabilities in shipped (production) deps
        run: npm run audit:ci
        continue-on-error: true

      - name: Generate SBOM (CycloneDX, shipped deps)
        run: npm run sbom

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
