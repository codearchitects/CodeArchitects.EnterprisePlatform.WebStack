name: Bug report
description: Report a defect in a @ca-webstack/* or @caep/* package
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please do **not** use
        this form for security vulnerabilities — see [SECURITY.md](../blob/master/SECURITY.md).
  - type: input
    id: package
    attributes:
      label: Affected package(s)
      description: Which package(s) are affected?
      placeholder: "@ca-webstack/reflection"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package / monorepo version where you saw the bug.
      placeholder: "21.0.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps or a repository/snippet that reproduces the issue.
      placeholder: |
        1. ...
        2. ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, npm version, OS, browser (if relevant).
      placeholder: |
        - Node: 22.x
        - npm: 10.x
        - OS: macOS 15
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
