version: 2
updates:
  # npm dependencies across the whole workspace (single root lockfile)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Internal workspace packages are linked locally and versioned by the release
    # pipeline — never let Dependabot try to bump them from the registry.
    ignore:
      - dependency-name: "@ca-webstack/*"
      - dependency-name: "@caep/*"
    groups:
      # Batch low-risk updates to reduce PR noise
      angular:
        patterns:
          - "@angular*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
          - "@schematics/*"
          - "ng-packagr"
          - "zone.js"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Keep GitHub Actions used in workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
