@if (model) {
  <button
    class="topbar-button"
    [attr.aria-label]="model.ariaLabel | translate"
    [attr.aria-labelledby]="model.ariaLabelledby"
    [disabled]="!enable"
    (click)="model.handler($event)"
  >
    <i class="topbar-button__icon icon-{{ model.icon }}" aria-hidden="true"></i>
  </button>
}
