<button
  class="header"
  [attr.aria-label]="toggleAriaLabel | translate"
  [attr.aria-expanded]="!collapsed"
  [attr.aria-controls]="navId"
  (click)="onToggle()"
>
  <img class="logo" alt="" aria-hidden="true" [src]="collapsed ? logoCollapsed : logo" />
  <div class="collapser">
    <img alt="" aria-hidden="true" [src]="collapsed ? expandIcon : collapseIcon" />
  </div>
</button>
<nav class="caep-side-menu__nav" [attr.id]="navId" [attr.aria-label]="navAriaLabel | translate">
  @if (entries?.length && !collapsed) {
    <ul class="caep-side-menu__entries">
      @for (entry of entries; track entry.id) {
        <li class="caep-side-menu__list">
          <caep-side-menu-entry
            [model]="entry"
            [resource]="entry?.resource"
            [enable]="entry?.enable"
            [show]="entry?.show"
          ></caep-side-menu-entry>
        </li>
      }
    </ul>
  }
</nav>
