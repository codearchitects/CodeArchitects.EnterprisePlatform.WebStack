<a class="container-skip-link" [href]="'#' + mainId" (click)="onSkipToMain($event, mainRef)">
  {{ skipToMainLabel | translate }}
</a>
<ng-content select="caep-side-menu,[side-menu]"></ng-content>
<div class="container-right">
  <ng-content select="caep-topbar,[topbar]"></ng-content>
  <main
    #mainRef
    class="content-container"
    [attr.id]="mainId"
    tabindex="-1"
    [attr.aria-label]="mainAriaLabel || null"
  >
    <div>
      <ng-content></ng-content>
    </div>
  </main>
</div>
