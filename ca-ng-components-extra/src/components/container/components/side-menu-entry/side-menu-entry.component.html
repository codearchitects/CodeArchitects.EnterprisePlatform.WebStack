@if (model && show) {
  @if (visible) {
    <a
      class="caep-side-menu__entry"
      [title]="model.label | translate"
      [class.first-level]="!parent"
      [class.caep-side-menu--active]="isActive"
      [class.caep-side-menu--active-route]="isActiveRoute"
      [class.caep-side-menu--expandable]="isExpandable"
      [attr.target]="model.link?.target"
      [attr.tabindex]="isExpandable ? 0 : null"
      [attr.role]="isExpandable && !model.link?.url ? 'button' : null"
      [attr.aria-expanded]="isExpandable ? !!isOpen : null"
      [attr.aria-controls]="isExpandable && hasChildren && isOpen ? childrenId : null"
      [attr.aria-current]="isActiveRoute ? 'page' : null"
      [caepRouterLink]="model"
      [enable]="enable"
      (inward)="onInward()"
      (keydown.enter)="onEntryKeydown($event)"
      (keydown.space)="onEntryKeydown($event)"
    >
      @if (isExpandable) {
        <div class="caep-side-menu__chevron-icon" [class.chevron--open]="isOpen" aria-hidden="true"></div>
      }
      @if (!isExpandable) {
        <div class="caep-side-menu__active-icon" [class.item--active]="isActiveRoute" aria-hidden="true"></div>
      }
      <span class="caep-side-menu__label"> {{ model.label | translate }} </span>
    </a>
  }
  @if (hasChildren && isOpen) {
    <div class="caep-side-menu__children" [id]="childrenId">
      @for (child of model.children; track child.id) {
        <caep-side-menu-entry
          [parent]="model"
          [model]="child"
          [resource]="child?.resource"
          [enable]="child?.enable"
          [show]="child?.show"
          (inward)="onChildInward()"
        ></caep-side-menu-entry>
      }
    </div>
  }
}
