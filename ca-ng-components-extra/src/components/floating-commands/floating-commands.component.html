<div
  [id]="id + '-caepDragHandle'"
  class="caep-drag-handle"
  role="button"
  tabindex="0"
  [attr.aria-label]="dragHandleAriaLabel || null"
  (keydown)="onDragHandleKeydown($event)"
></div>
<div class="floating-commands-content" role="toolbar" [attr.aria-label]="ariaLabel || null">
  <ng-content></ng-content>
</div>
