<header class="row header" role="banner" [attr.aria-label]="ariaLabel || null">
  <div class="col-3 col-hd-12 col-hdmd-3 header-inner-start">
    <div class="search-placeholder" aria-hidden="true"></div>
    <ng-content select="[header-start]"></ng-content>
  </div>
  <section class="col header-inner-space">
    <ng-content select="[header-center]"></ng-content>
  </section>
  <div class="col header-inner-end">
    <ng-content select="[header-end]"></ng-content>
  </div>
</header>
