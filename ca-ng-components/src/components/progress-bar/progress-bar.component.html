<div class="sh-progress-bar" role="progressbar" #controlRef *ngIf="show" [class.disabled]="!enable">
  <div class="sh-progress-bar-fill" [class.is-indeterminate]="isIndeterminate"
    [ngStyle]="{'transform':'scaleX('+ (value | progressBarPercent:min:max) +')'}"></div>
</div>
<span class="label" [class.incoherent]="value > max"
  *ngIf="showLabel && !isIndeterminate ">{{(value | progressBarPercent:min:max) | percent:internalOptions.format}}</span>
