<nav [attr.aria-label]="ariaLabelledBy ? null : (ariaLabel || ('breadcrumb' | translate))"
     [attr.aria-labelledby]="ariaLabelledBy"
     [attr.aria-describedby]="ariaDescribedBy">
  <ol>
    <li>
      <span [attr.tabindex]="internalOptions.tabindex"
            [attr.role]="hasVisibleFrames ? 'link' : null"
            [attr.aria-current]="hasVisibleFrames ? null : 'page'"
            routerLink="/"
            (keydown.enter)="onActivateKey($event)"
            (keydown.space)="onActivateKey($event)">HOME</span>
    </li>
    @if (activity?.CurrentPayload?.stack) {
      @for (frame of activity.CurrentPayload.stack; track frame) {
        @if (!frame.isReturnPoint) {
          <li>
            <div class="divider" aria-hidden="true">/</div>
            <span [attr.tabindex]="internalOptions.tabindex"
                  [attr.role]="isCurrentFrame(frame) ? null : 'link'"
                  [attr.aria-current]="isCurrentFrame(frame) ? 'page' : null"
                  [routerLink]="frame | breadcrumb"
                  (click)="actualize(frame)"
                  (keydown.enter)="onActivateKey($event)"
                  (keydown.space)="onActivateKey($event)">
              {{frame.label || (hasFallback && frame.action ? frame.action[0] : '') | translate}}
            </span>
          </li>
        }
      }
    }
  </ol>
</nav>
