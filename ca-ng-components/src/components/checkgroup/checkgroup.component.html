<div *ngIf="show && formControl" [id]="internalOptions.id" [class]="containerClass" [class.checkgroup]="true"
  [attr.autofocus]="internalOptions.autofocus || null" #controlRef>
  <div *ngFor="let value of values" [attr.inline]="internalOptions.isInline ? true : null">
    <div class="checkbox" [attr.tabindex]="internalOptions.tabindex" (keydown)="onKey(value.id,$event)"
      [class.disabled]="formControl.disabled || !enable" [class.checked]="!!value.formControl.value">
      <input [formControl]="value.formControl" type="checkbox" [attr.id]="value.id"
        [attr.readonly]="internalOptions.isReadonly ? true : null" [disabled]="formControl.disabled || !enable">
      <label (click)="toggle(value.id)"></label>
    </div>
    <span *ngIf="value.label" [attr.for]="value.id" (click)="toggle(value.id)" translate>{{value.label}}</span>
  </div>
</div>
