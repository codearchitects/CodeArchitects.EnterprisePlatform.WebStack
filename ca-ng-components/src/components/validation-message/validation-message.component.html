<div *ngIf="internalOptions.showValidationMessage && control?.touched">
  <p *ngFor="let error of errors">{{ error | errorMessage:internalOptions.messages:control:model:prop | i18n }}</p>
  <ng-container *ngIf="!errors?.length && warnings?.length">
    <p class="warning" *ngFor="let warning of warnings">
      {{ warning | warningMessage:internalOptions.messages:control:model:prop | i18n }}
    </p>
  </ng-container>
</div>
