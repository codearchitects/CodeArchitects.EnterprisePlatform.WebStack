<div *ngIf="show" class="command" (click)="handle()" [class.disabled]="!enable">
  <div *ngIf="command.routerLink; else commandDescriptor" class="routed-command" [routerLink]="command.routerLink">
    <ng-container *ngTemplateOutlet="commandDescriptor"></ng-container>
  </div>
  <ng-template #commandDescriptor>
    <sh-icon *ngIf="command.icon" [name]="command.icon"></sh-icon>
    <div translate>
      {{command?.name}}
    </div>
  </ng-template>
</div>
