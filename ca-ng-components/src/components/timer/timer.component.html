@if (show) {
  <!--
    The visible countdown updates every second. Exposing it as a polite live region
    would flood assistive tech with never-catching-up speech, so its ticking value is
    hidden from AT (aria-hidden) and discrete state changes are announced via the
    dedicated role="status" region below (see statusKey / handleEvent).
  -->
  <div aria-hidden="true">
    <countdown #cd [config]="{
        leftTime: leftTime,
        notify: 0,
        demand: !internalOptions.autoplay,
        format: internalOptions.format,
        prettyText: internalOptions.transform,
        timezone: internalOptions.timezone
      }" (event)="handleEvent($event)">
    </countdown>
  </div>
  <!--
    Screen-reader-only live region. Announces only discrete transitions
    (start/pause/resume/stop/done/restart), never the per-second tick.
    aria-atomic re-announces the whole message as a unit; a localized 'timer'
    label provides context when the consumer supplies no accessible name.
  -->
  <span class="sh-visually-hidden" role="status" aria-atomic="true"
    [attr.aria-label]="ariaLabelledBy ? null : (ariaLabel ?? ('timer' | translate))"
    [attr.aria-labelledby]="ariaLabelledBy" [attr.aria-describedby]="ariaDescribedBy">
    @if (statusKey) {
      {{ statusKey | translate }}
    }
  </span>
  @if (countdown && internalOptions.showPlayer) {
    <div class="player">
      @if (canRestart) {
        <sh-button [primary]="true" [enable]="enable" class="restart" title="{{'restart' | translate}}"
          [options]="{ ariaLabel: ('restart' | translate) }"
          (clicked)="restart()">↺</sh-button>
      }
      @if (canPause) {
        <sh-button [primary]="true" [enable]="enable" class="pause" title="{{'pause' | translate}}"
          [options]="{ ariaLabel: ('pause' | translate) }"
          (clicked)="pause()">⏸
        </sh-button>
      }
      @if (canStart) {
        <sh-button [primary]="true" [enable]="enable" class="start" title="{{'start' | translate}}"
          [options]="{ ariaLabel: ('start' | translate) }"
          (clicked)="start()">▶
        </sh-button>
      }
      @if (canResume) {
        <sh-button [primary]="true" [enable]="enable" class="resume" title="{{'resume' | translate}}"
          [options]="{ ariaLabel: ('resume' | translate) }"
          (clicked)="resume()">▶
        </sh-button>
      }
      @if (canStop) {
        <sh-button [primary]="true" [enable]="enable" class="stop" title="{{'stop' | translate}}"
          [options]="{ ariaLabel: ('stop' | translate) }"
          (clicked)="stop()">⏹︎
        </sh-button>
      }
    </div>
  }
}
