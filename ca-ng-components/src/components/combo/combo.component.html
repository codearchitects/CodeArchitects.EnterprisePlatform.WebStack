@if (show && formControl) {
  <div shDropdownContainer [class]="containerClass" [class.combo-container]="true"
    (clickOutside)="onClickOutside()">
    <input #input [attr.autofocus]="internalOptions.autofocus || null" type="text" [id]="internalOptions.id"
      [class]="inputClass" placeholder="{{placeholder?.key ? (placeholder | i18n) : (placeholder | translate)}}"
      autocomplete="off" [attr.tabindex]="internalOptions.tabindex" [style.minWidth]="width" [style.maxWidth]="width"
      (click)="touch()" [style.minHeight]="height" [style.maxHeight]="height" [class.with-icon]="true"
      [attr.disabled]="!enable || null" [(ngModel)]="text" [class.invalid]="formControl.invalid"
      [class.sh-populated]="!!formControl.value" [attr.readonly]="internalOptions.isReadonly ? true : null"
      [attr.maxlength]="internalOptions.maxLength || null"
      [class.floating-placeholder]="placeholder && (formControl.value === undefined || formControl.value === null || formControl.value === '') && !input.value"
      [class.opened]="isOpened">
    @if (placeholder) {
      <label [attr.for]="internalOptions.id">{{placeholder?.key ? (placeholder | i18n) : (placeholder | translate)}}</label>
    }
    <sh-icon vertical-centered pointer name="{{ isOpened ? internalOptions.caretUpIcon : internalOptions.caretDownIcon }}"
      (click)="enable && !internalOptions.isReadonly && (isOpened = !isOpened)">
    </sh-icon>
    @if (isOpened && !internalOptions.isReadonly) {
      <div shDropdown #dropdown class="results"
        [style.width]="dropdownWidth" [style.maxHeight]="internalOptions.dropdownHeight">
        <ul #results>
          @if (internalOptions.showTextAsResult && text && !values.length) {
            <li class="result" [class.current-item]="activeResultIndex === -1" (click)="onSelectText(text)">
              <span>{{text}}</span>
            </li>
          }
          @for (value of values; track value.id; let i = $index) {
            <li class="result" [class.current-item]="activeResultIndex === i"
              [class.selected]="value.ref === formControl.value" (click)="onSelectValue(value.ref)">
              <span [id]="value.id" translate>{{value.label}}</span>
            </li>
          }
          <ng-content select="[footer]"></ng-content>
        </ul>
      </div>
    }
  </div>
}
