@if (show && model) {
  <div attr.id="dyl-topbar-{{ model.id }}" class="topbar-item-container" [ngClass]="model.containerClass | async">
    @if (!model.templateRef) {
      <caep-topbar-button
        [model]="model"
        [enable]="model.enable"
        [show]="model.show"
        [resource]="model.resource"
      ></caep-topbar-button>
    } @else {
      <ng-container *ngTemplateOutlet="model.templateRef; context: model | topbarItemTemplateContext"></ng-container>
    }
  </div>
}
